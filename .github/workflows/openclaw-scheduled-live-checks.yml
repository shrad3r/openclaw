name: OpenClaw Scheduled Live And E2E Checks

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: openclaw-scheduled-live-checks-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Repo E2E needs no provider credentials. Kept in its own call because the
  # reusable workflow only runs validate_repo_e2e when live_suite_filter is
  # empty, so it cannot share a call with the filtered live suites below.
  repo_e2e_checks:
    permissions:
      actions: read
      contents: read
      packages: write
      pull-requests: read
    uses: ./.github/workflows/openclaw-live-and-e2e-checks-reusable.yml
    with:
      ref: ${{ github.sha }}
      include_repo_e2e: true
      include_release_path_suites: false
      include_openwebui: false
      include_live_suites: false

  # Live suites are opt-in on credentials: without a key the run stays green
  # and skips rather than failing, and adding the secret turns them on with no
  # workflow change.
  detect_live_credentials:
    runs-on: ubuntu-24.04
    permissions: {}
    outputs:
      has_anthropic: ${{ steps.check.outputs.has_anthropic }}
    steps:
      - name: Check for Anthropic live credentials
        id: check
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "has_anthropic=true" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY is configured; live Anthropic suites will run."
          else
            echo "has_anthropic=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY is not configured; skipping live Anthropic suites."
          fi

  # Filtered to the Anthropic suite group, which resolves to the
  # native-live-src-gateway-profiles-anthropic-smoke suite at the default
  # 'stable' profile. Widen the filter as more provider secrets are added.
  anthropic_live_checks:
    needs: detect_live_credentials
    if: needs.detect_live_credentials.outputs.has_anthropic == 'true'
    permissions:
      actions: read
      contents: read
      packages: write
      pull-requests: read
    uses: ./.github/workflows/openclaw-live-and-e2e-checks-reusable.yml
    with:
      ref: ${{ github.sha }}
      include_repo_e2e: false
      include_release_path_suites: false
      include_openwebui: false
      include_live_suites: true
      live_suite_filter: native-live-src-gateway-profiles-anthropic
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Required by the workflow-contract test in
      # test/scripts/package-acceptance-workflow.test.ts, which asserts every
      # live-capable workflow plumbs this secret. Unset here, so it forwards empty.
      FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
